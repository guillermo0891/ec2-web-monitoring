name: Build and Deploy to ECS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPO: monitor-web
  ECS_CLUSTER: monitoring-cluster
  ECS_SERVICE: monitor-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Get ECR repository URI
        id: ecr
        run: |
          REPO_URI=$(aws ecr describe-repositories --repository-names "${ECR_REPO}" --query 'repositories[0].repositoryUri' --output text)
          echo "repo_uri=$REPO_URI" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${ECR_REPO}:${IMAGE_TAG} .
          docker tag ${ECR_REPO}:${IMAGE_TAG} ${{ steps.ecr.outputs.repo_uri }}:${IMAGE_TAG}
          echo "image=${{ steps.ecr.outputs.repo_uri }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Push image to ECR
        run: |
          IMAGE=${{ steps.ecr.outputs.repo_uri }}:${{ github.sha }}
          docker push $IMAGE

      - name: Update ECS service (force new deployment)
        run: |
          aws ecs update-service --cluster "${ECS_CLUSTER}" --service "${ECS_SERVICE}" --force-new-deployment --region "${AWS_REGION}"