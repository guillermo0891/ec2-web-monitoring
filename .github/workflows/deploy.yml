name: Terraform, Build and Deploy to ECS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPO: monitor-web
  ECS_CLUSTER: monitoring-cluster
  ECS_SERVICE: monitor-web
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform-build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: terraform apply -auto-approve -input=false

      - name: Ensure ECR repo exists and get URI
        id: ecr
        run: |
          set -euo pipefail
          REPO_NAME="${{ env.ECR_REPO }}"
          REGION="${{ env.AWS_REGION }}"
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$REGION" > /dev/null 2>&1; then
            echo "Repository $REPO_NAME not found — creating"
            aws ecr create-repository --repository-name "$REPO_NAME" --region "$REGION" >/dev/null
          fi
          REPO_URI=$(aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$REGION" --query 'repositories[0].repositoryUri' --output text)
          echo "repo_uri=$REPO_URI" >> $GITHUB_OUTPUT

      - name: Build Docker image (tag with SHA and :latest)
        run: |
          set -euo pipefail
          IMAGE_TAG=${{ github.sha }}
          REPO_URI="${{ steps.ecr.outputs.repo_uri }}"
          docker build -t "${REPO_URI}:${IMAGE_TAG}" .
          docker tag "${REPO_URI}:${IMAGE_TAG}" "${REPO_URI}:latest"
          echo "image=${REPO_URI}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Login to ECR and Push images
        run: |
          set -euo pipefail
          REPO_URI="${{ steps.ecr.outputs.repo_uri }}"
          IMAGE_SHA="${REPO_URI}:${{ github.sha }}"
          IMAGE_LATEST="${REPO_URI}:latest"
          REGISTRY="${REPO_URI%/*}"
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" | docker login --username AWS --password-stdin "${REGISTRY}"
          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_LATEST}"

      - name: Ensure ECS cluster exists
        run: |
          set -euo pipefail
          CLUSTER="${{ env.ECS_CLUSTER }}"
          REGION="${{ env.AWS_REGION }}"
          if ! aws ecs describe-clusters --clusters "$CLUSTER" --region "$REGION" --query "clusters[0].status" --output text >/dev/null 2>&1; then
            echo "Cluster $CLUSTER not found — creating"
            aws ecs create-cluster --cluster-name "$CLUSTER" --region "$REGION"
          else
            echo "Cluster exists"
          fi

      - name: Ensure ECS service exists
        run: |
          set -euo pipefail
          CLUSTER="${{ env.ECS_CLUSTER }}"
          SERVICE="${{ env.ECS_SERVICE }}"
          REGION="${{ env.AWS_REGION }}"
          STATUS=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$REGION" --query "services[0].status" --output text 2>/dev/null || echo "MISSING")
          if [ "$STATUS" = "MISSING" ] || [ "$STATUS" = "None" ]; then
            echo "Service $SERVICE not found in cluster $CLUSTER. Terraform should have created it. Failing the job."
            aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$REGION" || true
            exit 1
          else
            echo "Service exists (status: $STATUS)"
          fi

      - name: Update ECS service (force new deployment)
        run: |
          aws ecs update-service --cluster "${{ env.ECS_CLUSTER }}" --service "${{ env.ECS_SERVICE }}" --force-new-deployment --region "${{ env.AWS_REGION }}"